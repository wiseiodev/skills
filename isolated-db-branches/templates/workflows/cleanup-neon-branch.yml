name: cleanup-neon-branch

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Resolve branch name
        id: resolve
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          if [ "$BRANCH" = "main" ] || [ -z "$BRANCH" ]; then
            echo "Refusing to clean primary or empty branch."
            exit 0
          fi
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Install neonctl
        if: steps.resolve.outputs.branch != ''
        run: npm install -g neonctl

      - name: Delete Neon branch
        if: steps.resolve.outputs.branch != ''
        run: |
          neonctl branches delete "${{ steps.resolve.outputs.branch }}" \
            --project-id "$NEON_PROJECT_ID" || true

      - name: Remove Vercel preview env vars
        if: steps.resolve.outputs.branch != ''
        run: |
          npx --yes vercel@52.0.0 env rm DATABASE_URL preview "${{ steps.resolve.outputs.branch }}" \
            --yes --token="$VERCEL_TOKEN" || true
          npx --yes vercel@52.0.0 env rm DATABASE_URL_UNPOOLED preview "${{ steps.resolve.outputs.branch }}" \
            --yes --token="$VERCEL_TOKEN" || true
